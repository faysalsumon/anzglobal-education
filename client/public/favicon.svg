<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- White rounded background -->
  <rect width="160" height="160" rx="28" fill="#ffffff"/>

  <!-- Top book (horizontal bar with bookmark notch) -->
  <rect x="28" y="28" width="104" height="22" rx="4" fill="#3465A5"/>
  <polygon points="104,28 120,28 120,50 112,44 104,50" fill="#ffffff"/>

  <!-- Diagonal scroll/diploma -->
  <g transform="rotate(-40, 80, 80)">
    <rect x="36" y="72" width="88" height="18" rx="4" fill="#3465A5"/>
    <!-- Left ribbon end -->
    <polygon points="36,72 36,90 26,81" fill="#2a529e"/>
    <!-- Right ribbon end -->
    <polygon points="124,72 124,90 134,81" fill="#2a529e"/>
  </g>

  <!-- Bottom book (horizontal bar) -->
  <rect x="28" y="110" width="104" height="22" rx="4" fill="#3465A5"/>
</svg>
